name: Generate Blog Post

on:
  schedule:
    # 10am EDT Monday only (UTC-4 in summer -> 14:00 UTC)
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout blog repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout pipeline code
        uses: actions/checkout@v4
        with:
          repository: ELin0425/seo-affiliate-blog
          path: _pipeline

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: _pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r _pipeline/requirements.txt

      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLOG_REPO_PATH: ${{ github.workspace }}
        working-directory: _pipeline
        run: python main.py

      - name: Commit and push new article
        run: |
          git config user.email "bot@kitchen-finds.com"
          git config user.name "Kitchen Finds Bot"
          git add _posts/
          git diff --staged --quiet && echo "No new article generated." && exit 0
          git commit -m "post: auto-generated article"
          git push
