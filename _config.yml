title: Kitchen Finds
description: The best kitchen gadgets and tools under $50 — honest picks for home cooks, apartment dwellers, and anyone who actually uses their kitchen.
baseurl: ""
url: "https://kitchen-finds.com"

theme: minima
minima:
  date_format: "%B %-d, %Y"

author: Kitchen Finds

show_excerpts: true

permalink: /:year/:month/:day/:title/

header_pages:
  - about.md
  - guides.md
  - small-spaces.md
  - how-we-pick.md

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      author: "Kitchen Finds Team"

plugins:
  - jekyll-sitemap
  - jekyll-redirect-from

# SEO
lang: en_US
