<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <meta name="google-site-verification" content="2qnTHttCkepv9gsBtJ2tkCcXQT_WYeHrBaNh3xWESAY" />
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | prepend: site.baseurl }}">
  <style>
    body {
      background-color: #fdf8f3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 17px;
      line-height: 1.7;
      color: #222;
    }
    .site-header {
      background: #fff;
      border-top: 3px solid #d4622a;
      border-bottom: 1px solid #e8e0d8;
    }
    .site-title, .site-title:visited { color: #d4622a !important; font-weight: 800; }
    .site-title:hover { opacity: 0.85; text-decoration: none; }
    a { color: #d4622a; }
    a:visited { color: #a84a1e; }
    a:hover { color: #a84a1e; }
    h1, h2, h3 { font-weight: 700; }
    .post-content h2 { margin-top: 2em; border-bottom: 1px solid #ede5dc; padding-bottom: 4px; }
    .post-content h3 { margin-top: 1.5em; color: #333; }
    .post-content a[href*="amazon.com"]:not([data-inline]) {
      display: inline-block;
      background: #d4622a;
      color: #fff !important;
      padding: 6px 16px;
      border-radius: 5px;
      font-size: 0.9em;
      font-weight: 600;
      text-decoration: none !important;
      margin: 4px 0 12px;
    }
    .post-content a[href*="amazon.com"]:not([data-inline]):hover { background: #a84a1e; }
    .post-meta { font-size: 0.85em; color: #888; }
    .post-list h3 { font-size: 1.2em; margin-bottom: 2px; }
    .site-footer { background: #fff; border-top: 1px solid #e8e0d8; color: #999; font-size: 0.82em; }
    .rss-subscribe { display: none !important; }
    .post-content img { width: 100%; border-radius: 8px; margin: 1.2em 0 0.4em; }
    .post-content img + em { display: block; font-size: 0.78em; color: #aaa; margin-bottom: 1.5em; }
  </style>
  {% include head-custom.html %}
</head>
